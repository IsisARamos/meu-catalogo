<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Painel — Use Isis</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<header class="admin-header">
  <h1>Use Isis</h1>
  <p>Painel de produtos</p>
</header>

<main class="admin-container">
  <div class="admin-toolbar">
    <h2 id="contagem">Produtos</h2>
    <button class="btn btn-primary" id="btnNovo">+ Novo produto</button>
  </div>

  <div id="erroGeral"></div>

  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Foto</th>
          <th>Nome</th>
          <th>Categoria</th>
          <th>Preço</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="corpoTabela"></tbody>
    </table>
  </div>
</main>

<!-- MODAL FORMULÁRIO -->
<div class="modal-overlay" id="modalForm">
  <div class="modal">
    <div class="modal-titulo">
      <span id="tituloForm">Novo produto</span>
      <button class="modal-fechar" id="fecharForm">✕</button>
    </div>
    <div id="erroForm"></div>
    <form id="form">
      <div class="campo">
        <label for="campoNome">Nome</label>
        <input type="text" id="campoNome" required />
      </div>
      <div class="campo">
        <label for="campoCategoria">Categoria</label>
        <input type="text" id="campoCategoria" list="listaCategorias" required />
        <datalist id="listaCategorias"></datalist>
      </div>
      <div class="campo">
        <label for="campoPreco">Preço (R$)</label>
        <input type="number" id="campoPreco" min="0" step="0.01" required />
      </div>
      <div class="campo">
        <label for="campoDescricao">Descrição</label>
        <textarea id="campoDescricao"></textarea>
      </div>
      <div class="campo campo-toggle">
        <input type="checkbox" id="campoDisponivel" checked />
        <label for="campoDisponivel">Disponível (em estoque)</label>
      </div>
      <div class="campo">
        <label for="campoImagemUrl">Imagem — link (opcional se for enviar uma foto abaixo)</label>
        <input type="text" id="campoImagemUrl" placeholder="https://..." />
      </div>
      <div class="campo">
        <label for="campoImagemArquivo">Ou enviar uma foto</label>
        <input type="file" id="campoImagemArquivo" accept="image/*" />
        <div class="campo-imagem-preview" id="previewImagem" style="display:none;">
          <img id="previewImagemImg" src="" alt="Pré-visualização" />
          <span id="previewImagemTexto"></span>
        </div>
      </div>
      <div class="form-acoes">
        <button type="button" class="btn btn-secondary" id="cancelarForm">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="salvarForm">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL CONFIRMAÇÃO DE EXCLUSÃO -->
<div class="modal-overlay" id="modalConfirm">
  <div class="modal">
    <div class="modal-titulo">
      <span>Excluir produto</span>
      <button class="modal-fechar" id="fecharConfirm">✕</button>
    </div>
    <p id="textoConfirm" style="font-size:14px;color:var(--cinza);margin-bottom:18px;"></p>
    <div class="form-acoes">
      <button type="button" class="btn btn-secondary" id="cancelarConfirm">Cancelar</button>
      <button type="button" class="btn btn-danger" id="confirmarExcluir">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/admin.js"></script>
</body>
</html>
