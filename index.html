
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo — Use Isis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div style="background:#C9A84C;padding:8px;"></div>
    <div style="background:#FDFAF9;padding:32px 20px 28px;text-align:center;">
      <p style="font-size:10px;letter-spacing:5px;text-transform:uppercase;color:#A8A9AD;margin:0 0 10px;font-family:'Inter',sans-serif;">coleção exclusiva</p>
      <p style="font-family:'Playfair Display',serif;font-size:42px;font-weight:400;color:#C9A84C;letter-spacing:4px;margin:0;line-height:1.1;">USE</p>
      <p style="font-family:'Playfair Display',serif;font-size:42px;font-weight:400;color:#A8A9AD;letter-spacing:4px;margin:0 0 10px;line-height:1.1;">ISIS</p>
      <p style="font-size:12px;color:#A8A9AD;margin:0;font-family:'Inter',sans-serif;letter-spacing:2px;">✦ MODA FEMININA ✦</p>
      <p style="font-size:13px;color:#A8A9AD;margin:16px 0 0;font-family:'Inter',sans-serif;">Selecione os itens e envie seu pedido pelo WhatsApp <i class="fab fa-whatsapp"></i></p>
    </div>
    <div style="background:#A8A9AD;padding:8px;"></div>
  </div>
</header>
 
  <!-- FILTROS -->
  <nav class="filtros" id="filtros">
    <button class="filtro-btn ativo" data-cat="Todos">Todos</button>
  </nav>
 
  <!-- GRID DE PRODUTOS -->
  <main class="grid" id="grid"></main>
 
  <!-- RODAPÉ CARRINHO -->
  <div class="carrinho-bar" id="carrinhoBar">
    <div class="carrinho-info">
      <span id="carrinhoCount">0 itens</span>
      <span id="carrinhoTotal">R$ 0,00</span>
    </div>
    <button class="btn-pedido" id="btnPedido">Ver pedido →</button>
  </div>
 
  <!-- MODAL PEDIDO -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-fechar" id="modalFechar">✕</button>
      <h2 class="modal-titulo">Seu Pedido</h2>
      <div id="modalItens"></div>
      <div class="modal-total">
        <span>Total</span>
        <span id="modalTotalValor"></span>
      </div>
      <p class="modal-instrucao">Copie o resumo abaixo e cole no WhatsApp:</p>
      <textarea class="modal-texto" id="modalTexto" readonly></textarea>
      <div class="modal-acoes">
        <button class="btn-copiar" id="btnCopiar">Copiar resumo</button>
        <button class="btn-whats" id="btnWhats">Abrir WhatsApp</button>
      </div>
    </div>
  </div>
 
  <!-- LIGHTBOX FOTO AMPLIADA -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-fechar" id="lightboxFechar">✕</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
    <div class="lightbox-info">
      <p class="lightbox-nome" id="lightboxNome"></p>
      <p class="lightbox-preco" id="lightboxPreco"></p>
    </div>
    <button class="lightbox-whats" id="lightboxWhats"><i class="fab fa-whatsapp"></i> Pedir pelo WhatsApp</button>
  </div>
 
  <script src="js/catalogo.js"></script>
</body>
</html>
