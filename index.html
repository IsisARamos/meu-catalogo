<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Catálogo — Use Isis</title>
  <meta name="description" content="Catálogo de moda feminina — selecione os itens e envie seu pedido pelo WhatsApp" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F5E6E0" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Use Isis — Moda Feminina" />
  <meta property="og:description" content="Catálogo de moda feminina — selecione os itens e envie seu pedido pelo WhatsApp" />
  <meta property="og:image" content="https://isisaramos.github.io/meu-catalogo/og-image.png" />
  <meta property="og:url" content="https://isisaramos.github.io/meu-catalogo/" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header id="siteHeader" style="background:#F5E6E0;padding:48px 20px 40px;text-align:center;width:100%;transition:background .3s;">
  <p class="header-texto" style="font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:#8B5E3C;letter-spacing:10px;margin:0 0 4px;text-transform:uppercase;">use</p>
<p class="header-texto" style="font-family:'Playfair Display',serif;font-size:72px;font-weight:400;color:#8B5E3C;letter-spacing:12px;margin:0;line-height:1;">ISIS</p>
<div style="width:60px;height:1px;background:#D4A96A;margin:14px auto;"></div>
<p class="header-texto" style="font-size:18px;letter-spacing:4px;color:#8B5E3C;margin:0 0 16px;text-transform:uppercase;font-family:'Playfair Display',serif;">moda feminina</p>
<p style="font-size:13px;color:#8A8A8A;margin:0;font-family:'Inter',sans-serif;">Selecione os itens e envie seu pedido pelo WhatsApp <i class="fab fa-whatsapp" style="color:#25D366;"></i></p>
</header>

  <!-- BANNER ROTATIVO -->
  <div class="banner-slider">
    <div class="banner-track" id="bannerTrack"></div>
    <button class="banner-nav prev" id="bannerPrev" title="Slide anterior" aria-label="Slide anterior">&#8249;</button>
    <button class="banner-nav next" id="bannerNext" title="Próximo slide" aria-label="Próximo slide">&#8250;</button>
    <div class="banner-dots" id="bannerDots"></div>
  </div>

  <!-- BARRA DE PROGRESSO -->
  <div class="progresso-bar" id="progressoBar">
    <div class="progresso-fill" id="progressoFill"></div>
    <span class="progresso-texto" id="progressoTexto">0 itens no carrinho</span>
  </div>

  <!-- FILTROS -->
  <div class="filtros-wrapper">
    <nav class="filtros" id="filtros">
      <button class="filtro-btn ativo" data-cat="Todos">Todos</button>
    </nav>
    <div class="filtros-extra">
      <select class="filtro-preco" id="filtroPreco">
        <option value="0">Preço</option>
        <option value="50">Até R$50</option>
        <option value="100">Até R$100</option>
        <option value="200">Até R$200</option>
      </select>
      <button class="filtro-fav-btn" id="filtroFav" title="Ver favoritos" aria-label="Ver favoritos">
        <i class="fas fa-heart"></i>
      </button>
    </div>
  </div>

  <!-- GRID DE PRODUTOS -->
  <main class="grid" id="grid"></main>

  <!-- RODAPÉ CARRINHO -->
  <div class="carrinho-bar" id="carrinhoBar">
    <div class="carrinho-info">
      <span id="carrinhoCount">0 itens</span>
      <span id="carrinhoTotal">R$ 0,00</span>
    </div>
    <button class="btn-pedido" id="btnPedido">Ver pedido →</button>
  </div>

  <!-- MODAL PEDIDO -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-fechar" id="modalFechar" title="Fechar" aria-label="Fechar">✕</button>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 class="modal-titulo" style="margin:0;">Seu Pedido</h2>
        <button id="btnLimpar" style="background:none;border:1px solid #E8D6CE;color:#8A8A8A;font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;">Limpar tudo</button>
      </div>
      <!-- CAMPO NOME -->
      <div style="margin-bottom:14px;">
        <input id="nomeCliente" type="text" placeholder="Seu nome (opcional)" style="width:100%;border:1px solid #E8D6CE;border-radius:8px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:13px;color:#2D2D2D;background:#FDFAF9;outline:none;" />
      </div>
      <div id="modalItens"></div>
      <div class="modal-total">
        <span>Total</span>
        <span id="modalTotalValor"></span>
      </div>
      <p class="modal-instrucao">Copie o resumo abaixo e cole no WhatsApp:</p>
      <textarea class="modal-texto" id="modalTexto" readonly></textarea>
      <div class="modal-acoes">
        <button class="btn-copiar" id="btnCopiar">Copiar resumo</button>
        <button class="btn-whats" id="btnWhats">Abrir WhatsApp</button>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-fechar" id="lightboxFechar" title="Fechar" aria-label="Fechar">✕</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
    <div class="lightbox-info">
      <p class="lightbox-nome" id="lightboxNome"></p>
      <p class="lightbox-preco" id="lightboxPreco"></p>
    </div>
    <button class="lightbox-whats" id="lightboxWhats"><i class="fab fa-whatsapp"></i> Pedir pelo WhatsApp</button>
  </div>

  <!-- BOTÃO DARK MODE -->
  <button class="dark-toggle" id="darkToggle" title="Alternar modo escuro" aria-label="Alternar modo escuro">
    <svg class="icone-lua" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icone-sol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <script src="js/catalogo.js"></script>
</body>
</html>
